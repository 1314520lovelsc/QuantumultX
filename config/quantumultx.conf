# ================================
# Quantumult X 方案 A Pro Optimized：常用节点 + 分类国外规则（含独立 OpenAI / ChatGPT 分组）
# 目标：
# 1. 常用节点：香港 / 新加坡 / 日本 / 台湾 / 美国 / Trojan 低倍率
# 2. DNS：腾讯系域名走腾讯 DNSPod，其余默认走阿里云 AliDNS
# 3. 屏蔽：使用 AdBlockQXLite 作为唯一远程广告过滤规则
# 4. 国外规则：细分为 AI / 开发 / Google / 社交 / Telegram / 流媒体 / 微软等独立策略组
# 5. 每个分类策略组都使用完整节点池，并保留 direct，方便后续统一更新节点
# 6. 安全：仅对指定 hostname 启用 MitM / Rewrite，用于少量 App 去广告
# ================================


[general]
# 移动运营商认证相关域名排除，避免验证码、运营商登录异常
dns_exclusion_list = *.cmpassport.com, *.jegotrip.com.cn, *.icitymobile.mobi, id6.me

# 被 reject 的域名返回空结果
dns_reject_domain_behavior = no-error-no-answer

# 可选：丢弃 QUIC / STUN，减少部分连接绕过规则；若视频、Telegram 或微信通话异常，请注释本行
udp_drop_list = QUIC, STUN


[dns]
# 不使用系统 DNS，由 Quantumult X 接管 DNS
no-system

# 关闭 IPv6 解析，优先保证兼容性
no-ipv6

# 默认加密 DNS：除腾讯系域名外，其余默认走阿里云 AliDNS
doh-server = https://dns.alidns.com/dns-query

# 腾讯系域名：走腾讯 DNSPod DoH
doh-server = /*.qq.com/https://doh.pub/dns-query
doh-server = /*.tencent.com/https://doh.pub/dns-query
doh-server = /*.weixin.qq.com/https://doh.pub/dns-query
doh-server = /*.wx.qq.com/https://doh.pub/dns-query
doh-server = /*.gtimg.com/https://doh.pub/dns-query
doh-server = /*.qpic.cn/https://doh.pub/dns-query
doh-server = /*.myqcloud.com/https://doh.pub/dns-query
doh-server = /*.tencent-cloud.com/https://doh.pub/dns-query
doh-server = /*.tencentcs.com/https://doh.pub/dns-query
doh-server = /*.myapp.com/https://doh.pub/dns-query
doh-server = /*.smtcdns.com/https://doh.pub/dns-query
doh-server = /*.voovmeeting.com/https://doh.pub/dns-query


[server_remote]

[server_local]
# 常用节点：已过滤“剩余流量 / 套餐到期 / 过滤线路”等信息型假节点
trojan=0920d57d0ffaee894bc171f97869f2.lh.gtm.cac.cab:43077, password=1c643b-c896-4adf-88fe-b1b929f41e, over-tls=true, tls-host=tcca1.bilibili.com, tls-verification=false, udp-relay=true, tag=家


[policy]
# ================================
# 策略组命名说明
# 🚦兜底选择：未命中任何分类规则的流量走这里
# 🌐国外默认：大部分国外分类可以跟随它
# 🤖OpenAI：ChatGPT / OpenAI / Sora 专用
# ☘️其他AI：Claude / Anthropic / Cursor 等
# 🛠开发工具：GitHub / npm / Docker / Vercel 等
# 🔎Google服务：Google / YouTube / Gmail 等
# 💚微信直连：微信默认直连
# 🛑广告拦截：广告规则统一出口
# ================================
# 🚦兜底选择：未命中分类规则的伪全局出口，不测速，你自己手动选；保留 direct 方便一键直连
static=🚦兜底选择, 🌐国外默认, direct, 家, img-url=https://raw.githubusercontent.com/tugepaopao/Image-Storage/master/hand-painted/56.png

# 🌐国外默认：海外服务默认出口：所有国外分类默认可跟随它，也可以单独改
static=🌐国外默认, 家, direct, img-url=https://raw.githubusercontent.com/tugepaopao/Image-Storage/master/cartoon/Cute1/2921096.png

# 🍎苹果服务：App Store / 苹果商店专用；完整节点池 + direct
static=🍎苹果服务, direct, 🌐国外默认, 家, img-url=https://raw.githubusercontent.com/tugepaopao/Image-Storage/master/cartoon/Cute/apple.png

# 🤖OpenAI：ChatGPT / OpenAI App / 网页版统一走这里
static = 🤖OpenAI, 🌐国外默认, 家, direct

# ☘️其他AI：Claude / Anthropic / Cursor 等
static = ☘️其他AI, 🌐国外默认, 家, direct

# 🛠开发工具：GitHub / npm / Docker / Vercel 等
static = 🛠开发工具, 🌐国外默认, 家, direct

# 🔎Google服务：Google / YouTube / Gmail 等
static = 🔎Google服务, 🌐国外默认, 家, direct

# 💬社交媒体：X / Twitter / Instagram / Facebook / WhatsApp 等
static = 💬社交媒体, 🌐国外默认, 家, direct

# ✈️Telegram 专用
static = ✈️Telegram, 🌐国外默认, 家, direct

# 🎬流媒体：Netflix / Disney / Spotify / 国外媒体等
static = 🎬流媒体, 🌐国外默认, 家, direct

# 🪟微软服务：Microsoft / Office / OneDrive / Outlook / Bing 等；保留 direct
static = 🪟微软服务, direct, 🌐国外默认, 家

# 💚微信直连：默认 direct，保留国外网站节点和手动选择作为临时排查选项
static = 💚微信直连, direct, 🌐国外默认, 🚦兜底选择

# 🛑广告拦截：默认 reject；误伤时可临时切 direct 排查
static = 🛑广告拦截, reject, direct

[filter_remote]
# 局域网直连
FILTER_LAN, tag=LAN, force-policy=direct, inserted-resource=true, enabled=true

# AdBlockQXLite：替换原 AdBlockQXLite，作为唯一远程广告过滤规则
# 放在 CN 规则前面，避免部分国内广告域名先命中直连
https://raw.githubusercontent.com/1314520lovelsc/adblockfilters/main/rules/adblockqxlite.conf, tag=AdBlockQXLite, force-policy=🛑广告拦截, update-interval=86400, opt-parser=false, enabled=true

# 中国大陆区域直连
FILTER_REGION, tag=CN, force-policy=direct, inserted-resource=true, enabled=true


[filter_local]
# ================================
# 1. 局域网 / 私有地址直连
# ================================
host-suffix, local, direct
ip-cidr, 10.0.0.0/8, direct
ip-cidr, 127.0.0.0/8, direct
ip-cidr, 172.16.0.0/12, direct
ip-cidr, 192.168.0.0/16, direct
ip-cidr, 100.64.0.0/10, direct
ip-cidr, 224.0.0.0/24, direct


